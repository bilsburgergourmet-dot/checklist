<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checklist Bils Burger</title>
  <style>
    :root{--bg:#0f0d0b;--card:#1b1712;--card2:#262016;--txt:#f5efe7;--mut:#a79b8b;--line:#3a3025;--acc:#f5a623;--ok:#6ee7a2}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);font-family:Arial,sans-serif}
    header{position:sticky;top:0;background:rgba(15,13,11,.96);z-index:2;border-bottom:1px solid var(--line);padding:14px}
    h1{margin:0 0 10px;color:var(--acc);font-size:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{font-size:12px;color:var(--mut);display:block;margin-bottom:4px}
    input,select,textarea,button{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--txt);padding:11px;font-size:16px}
    button{background:var(--acc);color:#181006;border:none;font-weight:800}.secondary{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
    main{padding:14px;max-width:820px;margin:0 auto}.status{margin-top:10px;white-space:pre-wrap;color:var(--mut);background:var(--card2);border-radius:12px;padding:10px;font-size:14px}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.tab{padding:10px;border:1px solid var(--line);border-radius:12px;text-align:center;color:var(--mut);font-weight:800}.active{background:var(--acc);color:#181006}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}.head{display:flex;justify-content:space-between;gap:10px}.prod{font-weight:900;font-size:17px}.min{color:var(--mut);text-align:right;font-size:13px}
    .need{margin-top:8px;padding:8px;border-radius:10px;background:#13100d;font-weight:900}.ok{color:var(--ok)}.warn{color:var(--acc)}
    .foot{position:sticky;bottom:0;background:rgba(15,13,11,.96);border-top:1px solid var(--line);padding:12px 14px;display:grid;gap:8px;max-width:820px;margin:0 auto}
    .summary{color:var(--mut);font-size:14px}.admin{margin:12px 0;padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--card)}
    @media(max-width:560px){.grid{grid-template-columns:1fr} input,select,textarea,button{font-size:15px}}
  </style>
</head>
<body>
<header>
  <h1>🍔 Checklist Bils Burger</h1>
  <div class="grid">
    <div><label>Funcionário</label><input id="funcionario" placeholder="Seu nome"></div>
    <div><label>Data do checklist</label><input id="dataChecklist" type="date"></div>
  </div>
  <div class="status" id="status">Carregando...</div>
</header>
<main>
  <div class="tabs">
    <div class="tab active" data-cat="Dispensa">Dispensa</div>
    <div class="tab" data-cat="Geladeira">Geladeira</div>
    <div class="tab" data-cat="Freezer">Freezer</div>
  </div>
  <section id="lista"></section>
  <details class="admin">
    <summary><b>+ Adicionar/editar item</b></summary><br>
    <div class="grid">
      <div><label>Categoria</label><select id="admCategoria"><option>Dispensa</option><option>Geladeira</option><option>Freezer</option></select></div>
      <div><label>Produto</label><input id="admProduto" placeholder="Ex.: Shoyu"></div>
      <div><label>Unidade</label><input id="admUnidade" placeholder="un, kg, cx"></div>
      <div><label>Seg-Qui</label><input id="admSegQui" type="number" step="0.01" value="0"></div>
      <div><label>Sexta</label><input id="admSexta" type="number" step="0.01" value="0"></div>
      <div><label>Sáb-Dom</label><input id="admSabDom" type="number" step="0.01" value="0"></div>
    </div><br>
    <button class="secondary" onclick="salvarItemModelo()">Salvar item</button>
  </details>
</main>
<div class="foot">
  <div class="summary" id="summary">0 itens preenchidos</div>
  <button onclick="enviarChecklist()">Enviar checklist</button>
  <button class="secondary" onclick="carregarItens()">Recarregar itens</button>
</div>
<script>
const API_BASE = localStorage.getItem('BILS_API_BASE') || 'https://bils-burger-secretary.onrender.com/api';
const TOKEN = localStorage.getItem('BILS_CHECKLIST_TOKEN') || '';
let itens=[], categoriaAtual='Dispensa';
function hojeISO(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function addDaysISO(iso,days){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d));dt.setUTCDate(dt.getUTCDate()+days);return dt.toISOString().slice(0,10)}
function fmtBR(iso){if(!iso)return '';const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`}
function num(v){const n=Number(String(v??'').replace(',','.'));return Number.isFinite(n)?n:0}
function fmtNum(v){const n=Number(v||0);return Number.isInteger(n)?String(n):String(n).replace('.',',')}
function headers(){const h={'Content-Type':'application/json'}; if(TOKEN) h['x-checklist-token']=TOKEN; return h}
function setStatus(m){document.getElementById('status').textContent=m}
function key(){return 'bils_checklist_'+document.getElementById('dataChecklist').value}
function salvarLocal(){localStorage.setItem(key(),JSON.stringify({funcionario:funcionario.value,itens:itens.map(i=>({id:i.id,quantidade_atual:i.quantidade_atual??'',observacao:i.observacao??''}))}))}
function carregarLocal(){try{const raw=localStorage.getItem(key()); if(!raw)return; const data=JSON.parse(raw); if(data.funcionario&&!funcionario.value) funcionario.value=data.funcionario; const map=new Map((data.itens||[]).map(i=>[i.id,i])); itens=itens.map(i=>map.has(i.id)?{...i,...map.get(i.id)}:i)}catch(e){}}
async function carregarItens(){
  const d=dataChecklist.value||hojeISO(); dataChecklist.value=d; setStatus('Carregando itens...');
  const r=await fetch(`${API_BASE}/checklist-app/itens?data_checklist=${d}`,{headers:TOKEN?{'x-checklist-token':TOKEN}:{}});
  const t=await r.text(); if(!r.ok){setStatus('Erro ao carregar itens:\n'+t);return}
  const j=JSON.parse(t); itens=(j.itens||[]).map(i=>({...i,quantidade_atual:'',observacao:''})); carregarLocal(); render();
  setStatus(`Checklist feito em ${fmtBR(j.data_checklist)}\nVálido para ${fmtBR(j.data_alvo)}`);
}
function render(){
  const arr=itens.filter(i=>i.categoria===categoriaAtual);
  lista.innerHTML=arr.length?arr.map(i=>{
    const atual=i.quantidade_atual===''?'':num(i.quantidade_atual), precisa=i.quantidade_atual===''?null:Math.max(0,num(i.minimo_dia)-atual), un=i.unidade?' '+i.unidade:'';
    return `<div class="card"><div class="head"><div><div class="prod">${i.produto}</div><div style="color:var(--mut);font-size:13px">${i.categoria}</div></div><div class="min">mínimo<br><b>${fmtNum(i.minimo_dia)}${un}</b></div></div>
    <label>Quantidade atual</label><input type="number" step="0.01" inputmode="decimal" value="${i.quantidade_atual??''}" placeholder="Digite quanto tem" oninput="atualizarQtd('${i.id}',this.value)">
    <div class="need ${precisa&&precisa>0?'warn':'ok'}">${precisa===null?'Preencha a quantidade atual':precisa>0?`Precisa trazer: ${fmtNum(precisa)}${un}`:'OK, não precisa trazer'}</div>
    <textarea placeholder="Observação opcional" oninput="atualizarObs('${i.id}',this.value)">${i.observacao||''}</textarea></div>`
  }).join(''):`<div class="card">Nenhum item em ${categoriaAtual}.</div>`;
  atualizarResumo();
}
function atualizarQtd(id,v){itens=itens.map(i=>i.id===id?{...i,quantidade_atual:v}:i);salvarLocal();render()}
function atualizarObs(id,v){itens=itens.map(i=>i.id===id?{...i,observacao:v}:i);salvarLocal()}
function atualizarResumo(){const p=itens.filter(i=>i.quantidade_atual!==''&&i.quantidade_atual!=null).length;const f=itens.filter(i=>i.quantidade_atual!==''&&Math.max(0,num(i.minimo_dia)-num(i.quantidade_atual))>0).length;summary.textContent=`${p}/${itens.length} itens preenchidos | ${f} para levar`}
async function enviarChecklist(){
  const funcionario=document.getElementById('funcionario').value.trim(); if(!funcionario){alert('Preencha o nome do funcionário.');return}
  const data_checklist=dataChecklist.value||hojeISO(), data_alvo=addDaysISO(data_checklist,1);
  const payload={funcionario,data_checklist,data_alvo,itens:itens.map(i=>({categoria:i.categoria,produto:i.produto,minimo_dia:num(i.minimo_dia),quantidade_atual:i.quantidade_atual===''?0:num(i.quantidade_atual),observacao:i.observacao||''}))};
  setStatus('Enviando checklist...');
  const r=await fetch(`${API_BASE}/checklist-app/enviar`,{method:'POST',headers:headers(),body:JSON.stringify(payload)});
  const t=await r.text(); if(!r.ok){setStatus('Erro ao enviar checklist:\n'+t);return}
  const j=JSON.parse(t); setStatus(`Checklist enviado com sucesso!\nFuncionário: ${funcionario}\nData alvo: ${fmtBR(j.data_alvo)}\nItens para levar: ${j.total_itens_para_levar}`);
}
async function salvarItemModelo(){
  const payload={categoria:admCategoria.value,produto:admProduto.value.trim(),unidade:admUnidade.value.trim(),seg_qui:num(admSegQui.value),sexta:num(admSexta.value),sab_dom:num(admSabDom.value)};
  if(!payload.produto){alert('Digite o produto.');return}
  const r=await fetch(`${API_BASE}/checklist-app/itens`,{method:'POST',headers:headers(),body:JSON.stringify(payload)});
  const t=await r.text(); if(!r.ok){alert('Erro ao salvar item:\n'+t);return}
  admProduto.value='';admUnidade.value='';await carregarItens();alert('Item salvo.')
}
document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');categoriaAtual=tab.dataset.cat;render()});
dataChecklist.value=hojeISO(); dataChecklist.onchange=carregarItens; funcionario.oninput=salvarLocal; carregarItens();
</script>
</body>
</html>
