<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checklist Bils Burger</title>
  <style>
    :root{--bg:#0f0d0b;--card:#1b1712;--card2:#262016;--txt:#f5efe7;--mut:#a79b8b;--line:#3a3025;--acc:#f5a623;--ok:#6ee7a2;--bad:#ff8a8a}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);font-family:Arial,sans-serif}
    header{position:sticky;top:0;background:rgba(15,13,11,.96);z-index:2;border-bottom:1px solid var(--line);padding:14px}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}.brand img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:1px solid var(--line)}h1{margin:0;color:var(--acc);font-size:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    label{font-size:12px;color:var(--mut);display:block;margin-bottom:4px}
    input,select,textarea,button{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--txt);padding:11px;font-size:16px}
    button{background:var(--acc);color:#181006;border:none;font-weight:800;cursor:pointer}.secondary{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
    main{padding:14px;max-width:820px;margin:0 auto}.status{margin-top:10px;white-space:pre-wrap;color:var(--mut);background:var(--card2);border-radius:12px;padding:10px;font-size:14px}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.tab{padding:10px;border:1px solid var(--line);border-radius:12px;text-align:center;color:var(--mut);font-weight:800;cursor:pointer}.active{background:var(--acc);color:#181006}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}.head{display:flex;justify-content:space-between;gap:10px}.prod{font-weight:900;font-size:17px}.min{color:var(--mut);text-align:right;font-size:13px}
    .need{margin-top:8px;padding:8px;border-radius:10px;background:#13100d;font-weight:900}.ok{color:var(--ok)}.warn{color:var(--acc)}.bad{color:var(--bad)}
    .foot{position:sticky;bottom:0;background:rgba(15,13,11,.96);border-top:1px solid var(--line);padding:12px 14px;display:grid;gap:8px;max-width:820px;margin:0 auto}
    .summary{color:var(--mut);font-size:14px}.admin{margin:12px 0;padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--card)}
    .menu{display:grid;gap:10px;margin:14px auto;max-width:820px}.menuBtn{padding:18px;text-align:left;border-radius:16px;background:var(--card);border:1px solid var(--line);color:var(--txt);font-size:16px}.menuBtn strong{display:block;font-size:17px}.menuBtn span{display:block;margin-top:4px;color:var(--mut);font-size:13px}.menuBtn.on{border-color:var(--acc);box-shadow:0 0 0 1px rgba(245,166,35,.25)}.hidden{display:none!important}.topActions{display:flex;gap:8px;align-items:center;margin-bottom:10px}.back{width:auto;padding:9px 12px}
    .catTitle{margin:18px 0 8px;color:var(--acc);font-weight:900}.listHead,.itemRow{display:grid;grid-template-columns:1.5fr .75fr .75fr .75fr 92px;gap:8px;align-items:center}.listHead{color:var(--mut);font-size:12px;padding:0 8px 6px}.itemRow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;margin-bottom:8px}.itemName{background:none;border:none;color:var(--txt);padding:0;text-align:left;font-weight:900}.ref{grid-column:1/-1;background:#13100d;color:var(--mut);border-radius:10px;padding:8px;font-size:13px}.miniInput{padding:9px}.bring{font-weight:900}.noBtn{padding:9px;font-size:13px;background:var(--card2);color:var(--txt);border:1px solid var(--line)}.noBtn.marked{background:var(--ok);color:#062114}.unit{color:var(--mut);font-size:12px}
    @media(max-width:680px){.grid{grid-template-columns:1fr} input,select,textarea,button{font-size:15px}.listHead{display:none}.itemRow{grid-template-columns:1fr 1fr;gap:8px}.itemName{grid-column:1/-1}.bring{font-size:15px}.noBtn{grid-column:2}.ref{grid-column:1/-1}}
  </style>
</head>
<body>
<header>
  <div class="brand"><img src="assets/bils-logo.jpg" alt="Bils Burger"><h1>Checklist Bils Burger</h1></div>
  <div>
    <label>Funcionário</label><input id="funcionario" placeholder="Seu nome">
  </div>
  <div class="status" id="status">Escolha uma opção.</div>
</header>
<main>
  <section id="menuPrincipal" class="menu">
    <button class="menuBtn" onclick="abrirModulo('entrada')"><strong>CHECKLIST ENTRADA</strong><span>Em breve</span></button>
    <button class="menuBtn" onclick="abrirModulo('fechamento')"><strong>CHECKLIST FECHAMENTO</strong><span>Em breve</span></button>
    <button class="menuBtn on" onclick="abrirModulo('itens-diarios')"><strong>CHECKLIST ITENS DIÁRIOS</strong><span>Conferência de itens para o dia seguinte</span></button>
    <button class="menuBtn" onclick="abrirModulo('itens-sexta')"><strong>CHECKLIST ITENS SEXTA-FEIRA</strong><span>Em breve</span></button>
    <button class="menuBtn" onclick="abrirModulo('bebidas')"><strong>CHECKLIST BEBIDAS</strong><span>Em breve</span></button>
    <button class="menuBtn" onclick="abrirModulo('estoque')"><strong>CONTAGEM DE ESTOQUE</strong><span>Em breve</span></button>
  </section>

  <section id="appChecklist" class="hidden">
    <div class="topActions"><button class="secondary back" onclick="voltarMenu()">← Menu</button><b>CHECKLIST ITENS DIÁRIOS</b></div>
    <section id="lista"></section>
    <details class="admin">
    <summary><b>+ Adicionar/editar item</b></summary><br>
    <div class="grid">
      <div><label>Categoria</label><select id="admCategoria"><option>Dispensa</option><option>Geladeira</option><option>Freezer</option></select></div>
      <div><label>Produto</label><input id="admProduto" placeholder="Ex.: Shoyu"></div>
      <div><label>Unidade</label><input id="admUnidade" placeholder="un, kg, cx"></div>
      <div><label>Seg-Qui</label><input id="admSegQui" type="number" step="0.01" value="0"></div>
      <div><label>Sexta</label><input id="admSexta" type="number" step="0.01" value="0"></div>
      <div><label>Sáb-Dom</label><input id="admSabDom" type="number" step="0.01" value="0"></div>
    </div><br>
    <button class="secondary" onclick="salvarItemModelo()">Salvar item</button>
    </details>
  </section>
</main>
<div class="foot hidden" id="footerChecklist">
  <div class="summary" id="summary">0 itens preenchidos</div>
  <button onclick="enviarChecklist()">Enviar checklist</button>
  <button class="secondary" onclick="carregarItens()">Recarregar itens</button>
</div>
<script>
const SUPABASE_URL = 'https://kajfnpkokwmycfmnaiif.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthamZucGtva3dteWNmbW5haWlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODc3NzUsImV4cCI6MjA5MzA2Mzc3NX0.ScwxJFcdz3M3gv6oRf097qaqx_UJdZ7l0aVt61KIdCo';
let itens=[], categoriaAtual='Dispensa', moduloAtual=null;

function abrirModulo(modulo){
  if(modulo!=='itens-diarios'){setStatus('Este módulo ainda será configurado.');return}
  moduloAtual=modulo; menuPrincipal.classList.add('hidden'); appChecklist.classList.remove('hidden'); footerChecklist.classList.remove('hidden'); carregarItens();
}
function voltarMenu(){moduloAtual=null; appChecklist.classList.add('hidden'); footerChecklist.classList.add('hidden'); menuPrincipal.classList.remove('hidden'); setStatus('Escolha uma opção.')}

function hojeISO(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function addDaysISO(iso,days){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d));dt.setUTCDate(dt.getUTCDate()+days);return dt.toISOString().slice(0,10)}
function fmtBR(iso){if(!iso)return '';const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`}
function num(v){const n=Number(String(v??'').replace(',','.'));return Number.isFinite(n)?n:0}
function fmtNum(v){const n=Number(v||0);return Number.isInteger(n)?String(n):String(n).replace('.',',')}
function setStatus(m){document.getElementById('status').textContent=m}
function localKey(){return 'bils_checklist_'+hojeISO()}
function supaHeaders(extra={}){return {'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json',...extra}}
async function supa(path,opt={}){const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opt,headers:supaHeaders(opt.headers||{})});const txt=await r.text();if(!r.ok)throw new Error(txt||r.statusText);return txt?JSON.parse(txt):null}
function perfilMinimo(dataAlvo){const [y,m,d]=dataAlvo.split('-').map(Number);const wd=new Date(Date.UTC(y,m-1,d)).getUTCDay();if(wd===5)return 'sexta';if(wd===0||wd===6)return 'sab_dom';return 'seg_qui'}
function salvarLocal(){localStorage.setItem(localKey(),JSON.stringify({funcionario:funcionario.value,itens:itens.map(i=>({id:i.id,quantidade_atual:i.quantidade_atual??'',observacao:i.observacao??'',nao_precisa:!!i.nao_precisa}))}))}
function carregarLocal(){try{const raw=localStorage.getItem(localKey()); if(!raw)return; const data=JSON.parse(raw); if(data.funcionario&&!funcionario.value) funcionario.value=data.funcionario; const map=new Map((data.itens||[]).map(i=>[i.id,i])); itens=itens.map(i=>map.has(i.id)?{...i,...map.get(i.id)}:i)}catch(e){}}

async function carregarItens(){
  try{
    const d=hojeISO(); const dataAlvo=addDaysISO(d,1); const campo=perfilMinimo(dataAlvo);
    setStatus('Carregando itens do Supabase...');
    const rows=await supa('checklist_modelo_itens?select=*&ativo=eq.true&order=categoria.asc,ordem.asc,produto.asc');
    itens=(rows||[]).map(i=>({...i,minimo_dia:num(i[campo]),quantidade_atual:'',observacao:''}));
    carregarLocal(); render();
    setStatus(`Checklist feito em ${fmtBR(d)}\nVálido para ${fmtBR(dataAlvo)}\nFonte: Supabase`);
  }catch(e){setStatus('Erro ao carregar itens:\n'+e.message)}
}
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){
  const ordem=['Geladeira','Freezer','Dispensa'];
  const grupos=ordem.map(cat=>[cat,itens.filter(i=>i.categoria===cat)]).filter(([,arr])=>arr.length);
  lista.innerHTML=grupos.length?grupos.map(([cat,arr])=>`<div class="catTitle">${cat}</div><div class="listHead"><div>Item</div><div>Precisa</div><div>Tem</div><div>Trazer</div><div></div></div>`+arr.map(i=>{
    const atual=i.quantidade_atual===''?'':num(i.quantidade_atual);
    const precisa=i.nao_precisa?0:(i.quantidade_atual===''?null:Math.max(0,num(i.minimo_dia)-atual));
    const un=i.unidade?' '+i.unidade:'';
    return `<div class="itemRow">
      <button class="itemName" onclick="toggleRef('${i.id}')">${esc(i.produto)}<div class="unit">toque para ver referência</div></button>
      <div><span class="unit">Precisa</span><br><b>${fmtNum(i.minimo_dia)}${esc(un)}</b></div>
      <div><span class="unit">Tem</span><input class="miniInput" type="number" step="0.01" inputmode="decimal" value="${i.quantidade_atual??''}" placeholder="0" oninput="atualizarQtd('${i.id}',this.value)"></div>
      <div class="bring ${precisa&&precisa>0?'warn':'ok'}"><span class="unit">Trazer</span><br>${precisa===null?'-':fmtNum(precisa)+esc(un)}</div>
      <button class="noBtn ${i.nao_precisa?'marked':''}" onclick="marcarNaoPrecisa('${i.id}')">${i.nao_precisa?'Marcado':'Não precisa'}</button>
      ${i.showRef?`<div class="ref"><b>Referência:</b> ${esc(i.unidade||'Sem referência cadastrada')}</div>`:''}
    </div>`
  }).join('')).join(''):`<div class="card">Nenhum item cadastrado.</div>`;
  atualizarResumo();
}
function toggleRef(id){itens=itens.map(i=>i.id===id?{...i,showRef:!i.showRef}:i);render()}
function marcarNaoPrecisa(id){itens=itens.map(i=>i.id===id?{...i,nao_precisa:!i.nao_precisa,quantidade_atual:!i.nao_precisa?'':i.quantidade_atual}:i);salvarLocal();render()}
function atualizarQtd(id,v){itens=itens.map(i=>i.id===id?{...i,quantidade_atual:v,nao_precisa:false}:i);salvarLocal();render()}
function atualizarObs(id,v){itens=itens.map(i=>i.id===id?{...i,observacao:v}:i);salvarLocal()}
function atualizarResumo(){const p=itens.filter(i=>i.nao_precisa||(i.quantidade_atual!==''&&i.quantidade_atual!=null)).length;const f=itens.filter(i=>!i.nao_precisa&&i.quantidade_atual!==''&&Math.max(0,num(i.minimo_dia)-num(i.quantidade_atual))>0).length;summary.textContent=`${p}/${itens.length} itens preenchidos | ${f} para levar`}
async function enviarChecklist(){
  const funcionario=document.getElementById('funcionario').value.trim(); if(!funcionario){alert('Preencha o nome do funcionário.');return}
  const data_checklist=hojeISO(), data_alvo=addDaysISO(data_checklist,1);
  const rows=itens.map(i=>{const atual=i.nao_precisa?num(i.minimo_dia):(i.quantidade_atual===''?0:num(i.quantidade_atual));const precisa=i.nao_precisa?0:Math.max(0,num(i.minimo_dia)-atual);return {data_checklist,data_alvo,categoria:i.categoria,produto:i.produto,minimo_dia:num(i.minimo_dia),quantidade_atual:atual,precisa_trazer:precisa,observacao:[funcionario?`Funcionário: ${funcionario}`:'',i.nao_precisa?'Não precisa marcado':'',i.observacao||''].filter(Boolean).join(' | ')||null,origem:'checklist_webapp',resolvido:precisa<=0}});
  try{
    setStatus('Enviando checklist para o Supabase...');
    await supa('checklist_levar',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(rows)});
    const total=rows.filter(r=>r.precisa_trazer>0).length;
    setStatus(`Checklist enviado com sucesso!\nFuncionário: ${funcionario}\nData alvo: ${fmtBR(data_alvo)}\nItens para levar: ${total}`);
    localStorage.removeItem(localKey());
  }catch(e){setStatus('Erro ao enviar checklist:\n'+e.message)}
}
async function salvarItemModelo(){
  const payload={categoria:admCategoria.value,produto:admProduto.value.trim(),unidade:admUnidade.value.trim()||null,seg_qui:num(admSegQui.value),sexta:num(admSexta.value),sab_dom:num(admSabDom.value),ativo:true};
  if(!payload.produto){alert('Digite o produto.');return}
  try{
    await supa('checklist_modelo_itens?on_conflict=categoria,produto',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(payload)});
    admProduto.value='';admUnidade.value='';await carregarItens();alert('Item salvo.');
  }catch(e){alert('Erro ao salvar item:\n'+e.message)}
}
funcionario.oninput=salvarLocal;
</script>
</body>
</html>
