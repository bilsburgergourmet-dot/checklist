    button{background:var(--acc);color:#181006;border:none;font-weight:800;cursor:pointer}button:disabled{opacity:.45;cursor:not-allowed}.secondary{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
    main{padding:14px;max-width:820px;margin:0 auto}.status{margin-top:10px;white-space:pre-wrap;color:var(--mut);background:var(--card2);border-radius:12px;padding:10px;font-size:14px}

    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}.head{display:flex;justify-content:space-between;gap:10px}.prod{font-weight:900;font-size:17px}.min{color:var(--mut);text-align:right;font-size:13px}
    .need{margin-top:8px;padding:8px;border-radius:10px;background:#13100d;font-weight:900}.ok{color:var(--ok)}.warn{color:var(--acc)}.bad{color:var(--bad)}
    .foot{background:rgba(15,13,11,.96);border-top:1px solid var(--line);padding:12px 14px;display:grid;gap:8px;max-width:820px;margin:0 auto 18px}
    .summary{color:var(--mut);font-size:14px}.admin{margin:12px 0;padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--card)}
    .menu{display:grid;gap:10px;margin:14px auto;max-width:820px}.menuBtn{padding:18px;text-align:center;border-radius:16px;background:var(--card);border:1px solid var(--line);color:var(--txt);font-size:16px}.menuBtn strong{display:block;font-size:17px}.menuBtn span{display:block;margin-top:4px;color:var(--mut);font-size:13px}.menuBtn.on{border-color:var(--acc);box-shadow:0 0 0 1px rgba(245,166,35,.25)}.hidden{display:none!important}.topActions{display:flex;gap:8px;align-items:center;margin-bottom:10px}.back{width:auto;padding:9px 12px}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{appearance:none;-webkit-appearance:none;margin:0}input[type=number]{appearance:textfield;-moz-appearance:textfield}.catTitle{margin:18px 0 8px;color:var(--acc);font-weight:900}.listHead,.itemRow{display:grid;grid-template-columns:1.5fr .75fr .75fr .75fr 92px;gap:8px;align-items:center}.listHead{color:var(--mut);font-size:12px;padding:0 8px 6px}.itemRow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;margin-bottom:8px}.itemName{background:none;border:none;color:var(--txt);padding:0;text-align:left;font-weight:900}.ref{grid-column:1/-1;background:#13100d;color:var(--mut);border-radius:10px;padding:8px;font-size:13px}.miniInput{padding:9px}.bring{font-weight:900}.noBtn{padding:9px;font-size:13px;background:var(--card2);color:var(--txt);border:1px solid var(--line)}.noBtn.marked{background:var(--ok);color:#062114}.unit{color:var(--mut);font-size:12px}.bebidaRow{display:grid;grid-template-columns:1.4fr .7fr .7fr;gap:8px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;margin-bottom:8px}.bebidaName{font-weight:900}.bebidaRef{color:var(--mut);font-size:12px;margin-top:2px}.entradaBox{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin:0 0 14px}.entradaTitle{color:var(--acc);font-weight:900;margin:2px 0 10px}.checkRow{display:flex;gap:10px;align-items:flex-start;background:#13100d;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px}.checkRow input{width:22px;height:22px;flex:0 0 auto;accent-color:var(--acc)}.checkText{font-weight:800}.checkObs{color:var(--mut);font-size:13px;margin-top:3px;white-space:pre-wrap}.sectionSend{margin-top:10px}@media(max-width:680px){.bebidaRow{grid-template-columns:1fr 1fr}.bebidaName{grid-column:1/-1}}
    @media(max-width:680px){.grid{grid-template-columns:1fr} input,select,textarea,button{font-size:15px}.listHead{display:none}.itemRow{grid-template-columns:1fr 1fr;gap:8px}.itemName{grid-column:1/-1}.bring{font-size:15px}.noBtn{grid-column:2}.ref{grid-column:1/-1}}

function abrirModulo(modulo){
  if(!['entrada-cozinha','entrada-atendimento','fechamento-cozinha','fechamento-atendimento','itens-diarios','itens-sexta','bebidas','caixa'].includes(modulo)){setStatus('Este módulo ainda será configurado.');return}
  moduloAtual=modulo;
  editandoEnviado=Boolean(localStorage.getItem(submittedKey()));
  menuPrincipal.classList.add('hidden'); appChecklist.classList.remove('hidden'); footerChecklist.classList.toggle('hidden', modulo==='caixa'||modulo==='fechamento-atendimento');
  moduleTitle.textContent = modulo==='caixa' ? 'CONFERÊNCIA DE CAIXA' : modulo==='fechamento-cozinha' ? 'CHECKLIST FECHAMENTO COZINHA' : modulo==='fechamento-atendimento' ? 'CHECKLIST FECHAMENTO ATENDIMENTO' : modulo==='bebidas' ? 'CHECKLIST BEBIDAS' : modulo==='entrada-cozinha' ? 'CHECKLIST ENTRADA COZINHA' : modulo==='entrada-atendimento' ? 'CHECKLIST ENTRADA ATENDIMENTO' : modulo==='itens-sexta' ? 'CHECKLIST ITENS SEXTA-FEIRA' : 'CHECKLIST ITENS DIÁRIOS';
  funcionarioBox.classList.toggle('hidden', modulo==='caixa'||modulo.startsWith('fechamento'));
  extraBox.classList.toggle('hidden', modulo==='bebidas'||modulo.startsWith('entrada')||modulo==='caixa'||modulo.startsWith('fechamento'));
  btnEnviar.textContent=editandoEnviado?'Reenviar checklist':'Enviar checklist';
  if(modulo==='caixa') carregarCaixa(); else if(modulo==='fechamento-cozinha') carregarFechamentoCozinha(editandoEnviado); else if(modulo==='fechamento-atendimento') carregarFechamentoAtendimento(); else if(modulo==='bebidas') carregarBebidas(editandoEnviado); else if(modulo.startsWith('entrada')) carregarEntrada(editandoEnviado); else if(modulo==='itens-sexta') carregarItensSexta(editandoEnviado); else carregarItens(editandoEnviado);
}
function voltarMenu(){moduloAtual=null; appChecklist.classList.add('hidden'); footerChecklist.classList.add('hidden'); menuPrincipal.classList.remove('hidden'); setStatus(''); atualizarMenuEnvios()}

function hojeISO(){return fortalezaISO()}
function fortalezaISO(){const parts=new Intl.DateTimeFormat('en-CA',{timeZone:'America/Fortaleza',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());const m=Object.fromEntries(parts.map(p=>[p.type,p.value]));return `${m.year}-${m.month}-${m.day}`}
function addDaysISO(iso,days){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d));dt.setUTCDate(dt.getUTCDate()+days);return dt.toISOString().slice(0,10)}
function fmtBR(iso){if(!iso)return '';const [y,m,d]=iso.split('-');return `${d}/${m}/${y}`}
function diaSemanaBR(iso){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d,12,0,0));return new Intl.DateTimeFormat('pt-BR',{weekday:'long',timeZone:'America/Fortaleza'}).format(dt)}
function num(v){const n=Number(String(v??'').replace(',','.'));return Number.isFinite(n)?n:0}
function fmtNum(v){const n=Number(v||0);return Number.isInteger(n)?String(n):String(n).replace('.',',')}
function setStatus(m){const el=document.getElementById('status'); el.textContent=m||''; el.classList.toggle('hidden', !m)}
function pedirFuncionarioObrigatorio(){
  let nome=(funcionario.value||'').trim();
  while(!nome){
    nome=(prompt('Digite o nome do funcionário para enviar o checklist:')||'').trim();
    if(!nome) alert('O nome do funcionário é obrigatório.');
  }
  funcionario.value=nome; salvarLocal(); return nome;
}
function localKey(){return `bils_${moduloAtual||'checklist'}_draft_${hojeISO()}`}
function submittedKey(){return `bils_${moduloAtual||'checklist'}_submitted_${hojeISO()}`}
function envioKey(mod=moduloAtual){return `bils_${mod}_sent_${hojeISO()}`}
function horaFortaleza(){return new Intl.DateTimeFormat('pt-BR',{timeZone:'America/Fortaleza',hour:'2-digit',minute:'2-digit'}).format(new Date())}
function registrarEnvio(mod=moduloAtual,nome=''){const anterior=infoEnvio(mod);localStorage.setItem(envioKey(mod),JSON.stringify({hora:horaFortaleza(),funcionario:String(nome||'').trim(),reenvio:!!anterior}));atualizarMenuEnvios();return !!anterior}
function infoEnvio(mod){try{return JSON.parse(localStorage.getItem(envioKey(mod))||'null')}catch(e){return null}}
function textoEnvio(mod){const e=infoEnvio(mod);if(!e)return '';return `${e.reenvio?'Reenviado':'Enviado'} às ${e.hora}${e.funcionario?` pelo funcionário(a) ${e.funcionario}`:''}`}
function atualizarMenuEnvios(){document.querySelectorAll('.menuBtn[data-mod]').forEach(btn=>{const mod=btn.dataset.mod;if(mod==='caixa')return;let el=btn.querySelector('.sentInfo');if(!el){el=document.createElement('span');el.className='sentInfo';btn.appendChild(el)}el.textContent=textoEnvio(mod);el.classList.toggle('hidden',!el.textContent)})}

function supaHeaders(extra={}){return {'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json',...extra}}
async function supa(path,opt={}){const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opt,headers:supaHeaders(opt.headers||{})});const txt=await r.text();if(!r.ok)throw new Error(txt||r.statusText);return txt?JSON.parse(txt):null}
function perfilMinimo(dataAlvo){const [y,m,d]=dataAlvo.split('-').map(Number);const wd=new Date(Date.UTC(y,m-1,d)).getUTCDay();if(wd===5)return 'sexta';if(wd===0||wd===6)return 'sab_dom';return 'seg_qui'}
function salvarLocal(){localStorage.setItem(localKey(),JSON.stringify({funcionario:funcionario.value,item_extra:itemExtra?.value||'',itens:itens.map(i=>({id:i.id,quantidade_atual:i.quantidade_atual??'',observacao:i.observacao??'',nao_precisa:!!i.nao_precisa})),bebidas:bebidas.map(b=>({id:b.id,fardos:b.fardos??'',unidades:b.unidades??''})),entrada:{cozinha:entrada.cozinha.map(i=>({id:i.id,feito:!!i.feito})),atendimento:entrada.atendimento.map(i=>({id:i.id,feito:!!i.feito}))}}))}
function estadoAtual(){return {funcionario:funcionario.value,item_extra:itemExtra?.value||'',itens:itens.map(i=>({id:i.id,quantidade_atual:i.quantidade_atual??'',observacao:i.observacao??'',nao_precisa:!!i.nao_precisa})),bebidas:bebidas.map(b=>({id:b.id,fardos:b.fardos??'',unidades:b.unidades??''})),entrada:{cozinha:entrada.cozinha.map(i=>({id:i.id,feito:!!i.feito})),atendimento:entrada.atendimento.map(i=>({id:i.id,feito:!!i.feito}))}}}
function carregarLocal(usarEnviado=false){try{const raw=localStorage.getItem(usarEnviado?submittedKey():localKey()); if(!raw)return; const data=JSON.parse(raw); if(data.funcionario) funcionario.value=data.funcionario; if(itemExtra) itemExtra.value=(data.item_extra||'').slice(0,100); atualizarExtraCount(); const map=new Map((data.itens||[]).map(i=>[i.id,i])); itens=itens.map(i=>map.has(i.id)?{...i,...map.get(i.id)}:i); const bmap=new Map((data.bebidas||[]).map(i=>[i.id,i])); bebidas=bebidas.map(b=>bmap.has(b.id)?{...b,...bmap.get(b.id)}:b); const em=data.entrada||{}; const cmap=new Map((em.cozinha||[]).map(i=>[i.id,i])); const amap=new Map((em.atendimento||[]).map(i=>[i.id,i])); entrada.cozinha=entrada.cozinha.map(i=>cmap.has(i.id)?{...i,...cmap.get(i.id)}:i); entrada.atendimento=entrada.atendimento.map(i=>amap.has(i.id)?{...i,...amap.get(i.id)}:i)}catch(e){}}

function caixaKey(){return `bils_caixa_${hojeISO()}`}

function carregarCaixa(){
  let data={};try{data=JSON.parse(localStorage.getItem(caixaKey())||'{}')}catch(e){}
  lista.innerHTML=`<div class="card"><div class="grid"><div><label>MAQUINETA DO SISTEMA</label><input id="maqSistema" type="text" inputmode="numeric" value="${data.maqSistema||''}" oninput="formatarCampoCaixa(this);atualizarCaixa()"></div><div><label>MAQUINETA DA LOJA</label><input id="maqLoja" type="text" inputmode="numeric" value="${data.maqLoja||''}" oninput="formatarCampoCaixa(this);atualizarCaixa()"></div><div><label>DINHEIRO NO SISTEMA</label><input id="dinSistema" type="text" inputmode="numeric" value="${data.dinSistema||''}" oninput="formatarCampoCaixa(this);atualizarCaixa()"></div><div><label>DINHEIRO NO CAIXA</label><input id="dinCaixa" type="text" inputmode="numeric" value="${data.dinCaixa||''}" oninput="formatarCampoCaixa(this);atualizarCaixa()"></div></div></div><div class="card" id="resultadoCaixa"><div class="summary">Preencha os 4 campos para ver o resultado.</div></div>`;
  setStatus('Conferência de caixa do dia '+fmtBR(hojeISO())); atualizarCaixa();
}
function formatarCampoCaixa(el){const digits=String(el.value||'').replace(/\D/g,'');if(!digits){el.value='';return}el.value=(Number(digits)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function valorCampo(id){const el=document.getElementById(id);return el&&el.value!==''?num(el.value):null}
function textoDiferenca(v,tipo){if(v>0)return `Faltando ${dinheiroBR(v)} ${tipo}`;if(v<0)return `Sobrando ${dinheiroBR(Math.abs(v))} ${tipo}`;return `Fechado ${tipo}`}
function atualizarCaixa(){
  const ids=['maqSistema','maqLoja','dinSistema','dinCaixa'];const vals=Object.fromEntries(ids.map(id=>[id,valorCampo(id)]));
  localStorage.setItem(caixaKey(),JSON.stringify(Object.fromEntries(ids.map(id=>[id,document.getElementById(id)?.value||'']))));
  const box=document.getElementById('resultadoCaixa');if(!box)return;
  if(ids.some(id=>vals[id]===null)){box.innerHTML='<div class="summary">Preencha os 4 campos para ver o resultado.</div>';return}
  const difMaq=vals.maqSistema-vals.maqLoja;
  const difDin=vals.dinSistema-vals.dinCaixa;
  const final=difMaq+difDin;
  const finalTxt=final>0?`Faltando ${dinheiroBR(final)}.`:final<0?`Sobrando ${dinheiroBR(Math.abs(final))}.`:'Caixa fechado.';
  box.innerHTML=`<div class="need ${final===0?'ok':final>0?'bad':'warn'}">${textoDiferenca(difMaq,'nas maquinetas')}.<br>${textoDiferenca(difDin,'em espécie')}.<br><br>Resultado final: ${finalTxt}</div>`;
}

async function iniciarCameraFechamento(){
  try{
    if(fechamentoStream)fechamentoStream.getTracks().forEach(t=>t.stop());
    fechamentoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
    camFechamento.srcObject=fechamentoStream; camFechamento.classList.remove('hidden'); previewFechamento.classList.add('hidden');
  }catch(e){setStatus('Não consegui abrir a câmera. Verifique a permissão do navegador.')}
}
function capturarFechamento(){
  const v=document.getElementById('camFechamento'), c=document.getElementById('canvasFechamento');
  if(!v||!v.srcObject){setStatus('Abra a câmera antes de capturar a foto.');return}
  c.width=v.videoWidth||1280; c.height=v.videoHeight||720; c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  fechamentoFoto=c.toDataURL('image/jpeg',0.72); previewFechamento.src=fechamentoFoto; previewFechamento.classList.remove('hidden'); v.classList.add('hidden');
  if(fechamentoStream){fechamentoStream.getTracks().forEach(t=>t.stop()); fechamentoStream=null}
  salvarFechamentoLocal(); summary.textContent='Foto capturada'; setStatus('Foto capturada. Pode enviar o checklist de fechamento.');
}

function diaPerfilHoje(){const [y,m,d]=hojeISO().split('-').map(Number);const wd=new Date(Date.UTC(y,m-1,d)).getUTCDay();if(wd===5)return 'sexta';if(wd===0||wd===6)return 'sab_dom';return 'seg_qui'}
function entradaAtiva(item){const perfil=diaPerfilHoje(); if(item.regra==='seg_qui')return perfil==='seg_qui'; if(item.regra==='sex_dom')return perfil==='sexta'||perfil==='sab_dom'; return true}
function entradaObs(item){
  const p=diaPerfilHoje();
  if(item.id==='coz_4')return 'Maionese verde: meia bisnaga\nMaionese da casa: 1 bisnaga cheia\nMolho rosé: meia bisnaga';
  if(item.id==='coz_5')return p==='sab_dom'?'Batata G: 15 unidades\nBatata P: 10 unidades':'Batata G: 10 unidades\nBatata P: 5 unidades';
  if(item.id==='at_9')return p==='sexta'?'12 unidades':p==='sab_dom'?'15 unidades':'10 unidades';
  if(item.id==='at_10'){
    if(p==='sexta')return 'Maionese verde: 15 potinhos\nMaionese da casa: 15 potinhos\nMolho rosé: 6 potinhos';
    if(p==='sab_dom')return 'Maionese verde: 20 potinhos\nMaionese da casa: 20 potinhos\nMolho rosé: 18 potinhos';
    return 'Maionese verde: 10 potinhos\nMaionese da casa: 10 potinhos\nMolho rosé: 5 potinhos';
  }
  if(item.id==='at_12')return p==='seg_qui'?'Mínimo 2 unidades de cada':'Mínimo 4 unidades de cada';
  if(item.id==='at_14')return p==='sab_dom'?'Maionese verde: 1 bisnaga cheia\nMaionese da casa: 2 bisnagas cheias\nMolho rosé: 1 bisnaga e meia':'Maionese verde: 1 bisnaga cheia\nMaionese da casa: 1 bisnaga cheia\nMolho rosé: 1 bisnaga cheia';
  if(item.id==='at_15')return p==='sexta'?'10 pacotes':'20 pacotes';
  return item.obs||'';
}

function render(){

    const atual=i.quantidade_atual===''?'':num(i.quantidade_atual);
    const precisa=i.nao_precisa?0:(i.quantidade_atual===''?null:Math.max(0,num(i.minimo_dia)-atual));
    const un=i.unidade?' '+i.unidade:'';
    return `<div class="itemRow">
      <button class="itemName" onclick="toggleRef('${i.id}')">${esc(i.produto)}<div class="unit">toque para ver referência</div></button>
      <div><span class="unit">Precisa</span><br><b>${fmtNum(i.minimo_dia)}${esc(un)}</b></div>

  if(moduloAtual==='bebidas') return enviarChecklistBebidas();
  const funcionario=pedirFuncionarioObrigatorio();
  const faltando=itensIncompletos(); if(faltando.length){alert(`Preencha todos os itens ou marque Não precisa. Faltam ${faltando.length}.`); setStatus(`Checklist incompleto. Faltam ${faltando.length} itens.`); return}
  const data_checklist=hojeISO(), data_alvo=moduloAtual==='itens-sexta'?data_checklist:addDaysISO(data_checklist,1);
  const origemChecklist=moduloAtual==='itens-sexta'?'checklist_itens_sexta':'checklist_webapp';
  const rows=itens.map(i=>{const atual=i.nao_precisa?num(i.minimo_dia):(i.quantidade_atual===''?0:num(i.quantidade_atual));const precisa=i.nao_precisa?0:Math.max(0,num(i.minimo_dia)-atual);return {data_checklist,data_alvo,categoria:i.categoria,produto:i.produto,minimo_dia:num(i.minimo_dia),quantidade_atual:atual,precisa_trazer:precisa,observacao:[funcionario?`Funcionário: ${funcionario}`:'',i.nao_precisa?'Não precisa marcado':'',i.observacao||''].filter(Boolean).join(' | ')||null,origem:origemChecklist,resolvido:precisa<=0}});
  const extra=(itemExtra?.value||'').trim().slice(0,100);
  if(extra) rows.push({data_checklist,data_alvo,categoria:'EXTRA',produto:'ITEM A MAIS',minimo_dia:0,quantidade_atual:0,precisa_trazer:0,observacao:`Funcionário: ${funcionario} | Item a mais: ${extra}`,origem:origemChecklist,resolvido:false});
  try{
    setStatus('Enviando checklist para o Supabase...');
    await supa(`checklist_levar?data_checklist=eq.${data_checklist}&origem=eq.${origemChecklist}`,{method:'DELETE',headers:{Prefer:'return=minimal'}});
    await supa('checklist_levar',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(rows)});
    const total=rows.filter(r=>r.precisa_trazer>0).length;
    localStorage.setItem(submittedKey(), JSON.stringify(estadoAtual())); localStorage.removeItem(localKey()); registrarEnvio(moduloAtual,funcionario); btnEnviar.textContent='Reenviar checklist'; setStatus(`Checklist enviado.
Funcionário: ${funcionario}
Data alvo: ${fmtBR(data_alvo)}
Itens para levar: ${total}`); funcionario.value=''; if(itemExtra){itemExtra.value=''; atualizarExtraCount();}
  }catch(e){setStatus('Erro ao enviar checklist:\n'+e.message)}
}
funcionario.oninput=salvarLocal; atualizarExtraCount(); atualizarMenuEnvios();
</script>
